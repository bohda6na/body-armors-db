<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Report 3 — Equipment Readiness</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #1a3a5c; }
        h2 { color: #555; font-size: 14px; font-weight: normal; margin-top: -8px; }
        nav a { margin-right: 15px; color: #1a3a5c; font-weight: bold; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; background: white;
                box-shadow: 0 1px 4px rgba(0,0,0,.1); font-size: 12px; }
        th { background: #1a3a5c; color: white; padding: 9px 7px; text-align: left; }
        td { padding: 7px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f0f4ff; }
        .has-expired { background: #fff3cd; }
    </style>
</head>
<body>
<h1>Report 3 — Equipment Readiness Report</h1>
<h2>Task T4 | Stakeholders: Procurement Officer, Field Commander</h2>
<nav>
    <a href="/bodyarmor">Inventory</a>
    <a href="/reports/inventory">Report 1</a>
    <a href="/reports/certification">Report 2</a>
</nav>
<hr/>
<table>
    <tr>
        <th>Model</th><th>Level</th><th>Total</th>
        <th>New</th><th>Used</th><th>Damaged</th>
        <th>Expired</th><th>Decomm.</th><th>Avg Days Left</th>
    </tr>
    <tr th:each="r : ${rows}"
        th:class="${r['expiredUnits'] != null and r['expiredUnits'] > 0 ? 'has-expired' : ''}">
        <td th:text="${r['modelName']}"></td>
        <td th:text="${r['protectionLevel']}"></td>
        <td th:text="${r['totalUnits']}"></td>
        <td th:text="${r['newUnits'] != null ? r['newUnits'] : '-'}"></td>
        <td th:text="${r['usedUnits'] != null ? r['usedUnits'] : '-'}"></td>
        <td th:text="${r['damagedUnits'] != null ? r['damagedUnits'] : '-'}"></td>
        <td th:text="${r['expiredUnits'] != null ? r['expiredUnits'] : '-'}"></td>
        <td th:text="${r['decommUnits'] != null ? r['decommUnits'] : '-'}"></td>
        <td th:text="${r['avgDaysUntilExpiry'] != null ? r['avgDaysUntilExpiry'] : '-'}"></td>
    </tr>
</table>
<p style="font-size:12px;color:#888;">
    Models: <span th:text="${rows.size()}"></span>
    | Yellow = has expired units
</p>
</body>
</html>
