<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Report 1 — Inventory Status</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #1a3a5c; }
        h2 { color: #555; font-size: 14px; font-weight: normal; margin-top: -8px; }
        nav a { margin-right: 15px; color: #1a3a5c; font-weight: bold; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; background: white;
                box-shadow: 0 1px 4px rgba(0,0,0,.1); font-size: 12px; }
        th { background: #1a3a5c; color: white; padding: 9px 7px; text-align: left; }
        td { padding: 7px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f0f4ff; }
        .neg { color: #dc3545; font-weight: bold; }
        .pos { color: #155724; }
    </style>
</head>
<body>
<h1>Report 1 — Inventory Status Report</h1>
<h2>Tasks T1, T2 | Stakeholders: S1 Inventory Clerk, S2 QC Inspector</h2>
<nav>
    <a href="/bodyarmor">Inventory</a>
    <a href="/reports/certification">Report 2</a>
    <a href="/reports/readiness">Report 3</a>
</nav>
<hr/>
<table>
    <tr>
        <th>ID</th><th>Serial</th><th>Model</th><th>Manufacturer</th>
        <th>Level</th><th>Status</th><th>Prod. Date</th>
        <th>Expiry Date</th><th>Days Left</th>
        <th>Batch</th><th>Unit Cost</th><th>Last Inspection</th>
    </tr>
    <tr th:each="r : ${rows}">
        <td th:text="${r['productID']}"></td>
        <td th:text="${r['serialNumber']}"></td>
        <td th:text="${r['modelName']}"></td>
        <td th:text="${r['manufacturer']}"></td>
        <td th:text="${r['protectionLevel']}"></td>
        <td th:text="${r['conditionStatus']}"></td>
        <td th:text="${r['productionDate']}"></td>
        <td th:text="${r['expiryDate']}"></td>
        <td th:text="${r['daysUntilExpiry']}"></td>
        <td th:text="${r['batchNumber'] != null ? r['batchNumber'] : '-'}"></td>
        <td th:text="${r['unitCost'] != null ? r['unitCost'] : '-'}"></td>
        <td th:text="${r['inspectionDate'] != null ? r['inspectionDate'] : '-'}"></td>
    </tr>
</table>
<p style="font-size:12px;color:#888;">
    Total: <span th:text="${rows.size()}"></span> units
</p>
</body>
</html>
