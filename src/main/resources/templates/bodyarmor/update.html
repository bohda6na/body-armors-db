<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Update Condition — Form 2</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #1a3a5c; }
        nav a { color: #1a3a5c; font-weight: bold; text-decoration: none; }
        .form-card { background: white; padding: 24px; border-radius: 6px;
                     box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 480px; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0;
                    border-bottom: 1px solid #eee; font-size: 13px; }
        .info-label { color: #666; }
        .info-value { font-weight: bold; }
        label { display: block; margin-top: 14px; font-size: 13px; color: #444; }
        select, input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc;
                        border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .btn-submit { margin-top: 18px; background: #ffc107; color: #000; padding: 10px 22px;
                      border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-back { color: #1a3a5c; text-decoration: none; margin-left: 12px; font-size: 13px; }
        .unit-box { background: #e8eef7; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
    </style>
</head>
<body>
<h1>Form 2 — Update Condition Status</h1>
<nav><a href="/bodyarmor">← Back to Inventory</a></nav>
<hr/>
<div class="form-card">
    <div class="unit-box">
        <div class="info-row">
            <span class="info-label">Product ID</span>
            <span class="info-value" th:text="${unit.productID}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Serial Number</span>
            <span class="info-value" th:text="${unit.serialNumber}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Current Status</span>
            <span class="info-value" th:text="${unit.conditionStatus}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Last Inspection</span>
            <span class="info-value" th:text="${unit.inspectionDate}"></span>
        </div>
    </div>

    <form th:action="@{/bodyarmor/update/{id}(id=${unit.productID})}" method="post">
        <label>New Condition Status *
            <select name="conditionStatus" required>
                <option value="New"            th:selected="${unit.conditionStatus == 'New'}">New</option>
                <option value="Used"           th:selected="${unit.conditionStatus == 'Used'}">Used</option>
                <option value="Damaged"        th:selected="${unit.conditionStatus == 'Damaged'}">Damaged</option>
                <option value="Expired"        th:selected="${unit.conditionStatus == 'Expired'}">Expired</option>
                <option value="Decommissioned" th:selected="${unit.conditionStatus == 'Decommissioned'}">Decommissioned</option>
            </select>
        </label>
        <label>Inspection Date
            <input type="date" name="inspectionDate"/>
        </label>
        <button type="submit" class="btn-submit">💾 Save Update</button>
        <a href="/bodyarmor" class="btn-back">Cancel</a>
    </form>
</div>
</body>
</html>
