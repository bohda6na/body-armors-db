<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register New Batch — Form 1</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #1a3a5c; }
        nav a { margin-right: 15px; color: #1a3a5c; font-weight: bold; text-decoration: none; }
        .form-card { background: white; padding: 24px; border-radius: 6px;
                     box-shadow: 0 1px 4px rgba(0,0,0,.1); max-width: 680px; }
        .section { background: #e8eef7; padding: 6px 12px; margin: 16px 0 8px;
                   border-left: 4px solid #1a3a5c; font-weight: bold; color: #1a3a5c; }
        label { display: block; margin-top: 10px; font-size: 13px; color: #444; }
        input, select { width: 100%; padding: 7px; margin-top: 3px; border: 1px solid #ccc;
                        border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit { margin-top: 20px; background: #1a3a5c; color: white; padding: 10px 24px;
                      border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-back { color: #1a3a5c; text-decoration: none; margin-left: 12px; font-size: 13px; }
    </style>
</head>
<body>
<h1>Form 1 — Register New Body Armor Batch</h1>
<nav><a href="/bodyarmor">← Back to Inventory</a></nav>
<hr/>
<div class="form-card">
    <form method="post" action="/bodyarmor/register">

        <div class="section">📦 Manufacturer (Batch Delivery Certificate)</div>
        <div class="row">
            <div>
                <label>Brand Name *</label>
                <input type="text" name="brandName" required placeholder="e.g. AR500 Armor"/>
            </div>
            <div>
                <label>Country of Origin</label>
                <input type="text" name="countryOfOrigin" placeholder="e.g. USA"/>
            </div>
        </div>

        <div class="section">🛡 Armor Model (Product Specification Sheet)</div>
        <div class="row">
            <div>
                <label>Model Name *</label>
                <input type="text" name="modelName" required placeholder="e.g. Alpha Elite"/>
            </div>
            <div>
                <label>Protection Level *</label>
                <select name="protectionLevel" required>
                    <option value="">— Select —</option>
                    <option>NIJ-IIA</option>
                    <option>NIJ-II</option>
                    <option>NIJ-IIIA</option>
                    <option>NIJ-III</option>
                    <option>NIJ-IV</option>
                    <option>DSTU-8782</option>
                    <option>Level IV</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div>
                <label>SKU</label>
                <input type="text" name="SKU" placeholder="e.g. SKU-NEW-001"/>
            </div>
            <div>
                <label>Warranty (years)</label>
                <input type="number" name="warrantyYears" min="1" max="20" value="5"/>
            </div>
        </div>
        <div class="row">
            <div>
                <label>V50 Velocity (m/s)</label>
                <input type="number" step="0.01" name="v50Velocity" placeholder="e.g. 580.0"/>
            </div>
            <div>
                <label>Backface Deformation (mm)</label>
                <input type="number" step="0.01" name="backfaceDeformation" placeholder="e.g. 44.0"/>
            </div>
        </div>

        <div class="section">📋 Batch (Batch Delivery Certificate)</div>
        <div class="row">
            <div>
                <label>Batch Number *</label>
                <input type="text" name="batchNumber" required placeholder="e.g. BATCH-2025-A"/>
            </div>
            <div>
                <label>Unit Cost (USD)</label>
                <input type="number" step="0.01" name="unitCost" placeholder="e.g. 350.00"/>
            </div>
        </div>
        <div class="row">
            <div>
                <label>Delivery Date</label>
                <input type="date" name="deliveryDate"/>
            </div>
            <div>
                <label>Quantity *</label>
                <input type="number" name="quantity" min="1" value="1" required/>
            </div>
        </div>

        <div class="section">🔩 Unit Details (applied to each unit in batch)</div>
        <div class="row">
            <div>
                <label>Production Date</label>
                <input type="date" name="productionDate"/>
            </div>
            <div>
                <label>Weight (kg)</label>
                <input type="number" step="0.01" name="weight" placeholder="e.g. 3.5"/>
            </div>
        </div>
        <div class="row">
            <div>
                <label>Size</label>
                <select name="size">
                    <option value="">— Select —</option>
                    <option>S</option><option>M</option>
                    <option>L</option><option>XL</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-submit">✅ Register Batch</button>
        <a href="/bodyarmor" class="btn-back">Cancel</a>
    </form>
</div>
</body>
</html>
