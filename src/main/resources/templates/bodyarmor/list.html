<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Body Armor Inventory</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #1a3a5c; }
        nav a { margin-right: 15px; color: #1a3a5c; font-weight: bold; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .success { background: #d4edda; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
        th { background: #1a3a5c; color: white; padding: 10px 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #ddd; font-size: 13px; }
        tr:hover { background: #f0f4ff; }
        .status-New      { color: #155724; font-weight: bold; }
        .status-Used     { color: #856404; font-weight: bold; }
        .status-Damaged  { color: #721c24; font-weight: bold; }
        .status-Expired  { color: #6c757d; font-weight: bold; }
        .btn { padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn-edit   { background: #ffc107; color: #000; }
        .btn-delete { background: #dc3545; color: #fff; }
        .btn-add    { background: #1a3a5c; color: white; padding: 8px 16px; border-radius: 4px;
                      text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
<h1>🛡 Body Armor DBS — Inventory</h1>
<nav>
    <a href="/bodyarmor">Inventory</a>
    <a href="/bodyarmor/register">➕ Register Batch (F1)</a>
    <a href="/certification/certify">📋 Certify Model (F3)</a>
    <a href="/certification">Certifications</a>
    <a href="/reports/inventory">📊 Report 1</a>
    <a href="/reports/certification">📊 Report 2</a>
    <a href="/reports/readiness">📊 Report 3</a>
</nav>
<hr/>

<div th:if="${success}" class="success" th:text="${success}"></div>

<p><a href="/bodyarmor/register" class="btn-add">+ Register New Batch (Form 1)</a></p>

<table>
    <tr>
        <th>ID</th><th>Serial №</th><th>Model</th><th>Status</th>
        <th>Production</th><th>Inspection</th><th>Weight</th><th>Size</th>
        <th>Actions</th>
    </tr>
    <tr th:each="u : ${units}">
        <td th:text="${u.productID}"></td>
        <td th:text="${u.serialNumber}"></td>
        <td th:text="${u.modelID}"></td>
        <td>
            <span th:text="${u.conditionStatus}"
                  th:classappend="'status-' + ${u.conditionStatus}"></span>
        </td>
        <td th:text="${u.productionDate}"></td>
        <td th:text="${u.inspectionDate}"></td>
        <td th:text="${u.weight}"></td>
        <td th:text="${u.size}"></td>
        <td>
            <a th:href="@{/bodyarmor/update/{id}(id=${u.productID})}"
               class="btn btn-edit">✏ Update (F2)</a>
            <form th:action="@{/bodyarmor/delete/{id}(id=${u.productID})}"
                  method="post" style="display:inline"
                  onsubmit="return confirm('Decommission unit #' + this.action.split('/').pop() + '?')">
                <button type="submit" class="btn btn-delete">🗑 Decommission (F4)</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
